name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: docker build -t edocode-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t edocode-frontend ./frontend

      - name: Verify Build
        run: |
          docker images edocode-backend
          docker images edocode-frontend

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PostgreSQL for backend tests
        run: |
          docker run -d --name postgres-test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=tasksdb \
            -p 5432:5432 \
            postgres:15-alpine \
            -c max_connections=200
          sleep 5

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run Backend Tests
        run: |
          cd backend
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/tasksdb pytest tests/ -v --tb=short --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tasksdb

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false --ci

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            backend/coverage.xml
            frontend/coverage/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for backend
        run: |
          cd backend
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tasksdb" >> .env

      - name: Deploy with Docker Compose
        run: docker compose up -d

      - name: Verify Deployment
        run: |
          sleep 10
          docker compose ps
          curl -f http://localhost:8000/docs || echo "Backend not ready yet"
          curl -f http://localhost:3000 || echo "Frontend not ready yet"
